<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Kitchen Keeper{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link
            href="{{ url_for('static', filename='css/bootstrap.min.css') }}"
            rel="stylesheet"
    >

    <!-- App styles loaded after Bootstrap so we can extend/override -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<script
        src="{{ url_for('static', filename='css/bootstrap.bundle.min.js') }}">
</script>
<!--<body class="bg-purple-dark text-light">-->
<body>
{% include "components/navbar.html" %}

<main class="container py-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-4">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}

                        <button type="button"
                                class="btn-class"
                                data-bs-dismiss="alert"
                                aria-label="Close">
                        </button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

<script
        src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}">
</script>
{% block scripts %}{% endblock %}
</body>
</html>
